name: Build SUNMI Print Bridge APK

# Triggers:
#  - push to main that touches sunmi-print-bridge/ → builds + uploads APK as artifact
#  - tag push starting with bridge-v* → builds + creates a GitHub Release
#  - manual run from the Actions tab

on:
  push:
    branches: [main]
    paths:
      - 'sunmi-print-bridge/**'
      - '.github/workflows/build-android-pos.yml'
    tags:
      - 'bridge-v*'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Generate Gradle wrapper
        # The repo tracks only the Gradle build files (no wrapper jar). Run
        # the Gradle CLI installed by setup-gradle to create a versioned
        # wrapper that subsequent steps can drive via ./gradlew.
        working-directory: sunmi-print-bridge
        run: |
          gradle wrapper --gradle-version 8.4 --distribution-type bin
          ls -la gradle/wrapper

      - name: Build debug APK
        id: build_apk
        working-directory: sunmi-print-bridge
        run: |
          chmod +x ./gradlew
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace \
            2>&1 | tee "$GITHUB_WORKSPACE/build.log"

      - name: Upload full Gradle build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bridge-build-log
          path: build.log
          retention-days: 14

      - name: Rename APK
        if: success()
        working-directory: sunmi-print-bridge
        run: |
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          cp app/build/outputs/apk/debug/app-debug.apk \
             "$GITHUB_WORKSPACE/artifacts/sunmi-print-bridge-${{ github.sha }}.apk"
          ls -la "$GITHUB_WORKSPACE/artifacts"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sunmi-print-bridge-apk
          path: artifacts/*.apk
          retention-days: 30

      - name: Create GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/bridge-v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
